<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Monitor Papá</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4">
        <h1 class="mb-4 text-center">Monitor Papá</h1>

        <div id="alerta" class="alert alert-secondary text-center fs-4 fw-bold">Cargando...</div>

        <div class="card shadow-sm mb-3">
            <div class="card-header fw-bold">Dispositivos a conectar</div>
            <div class="card-body">
                <div class="form-check form-check-inline">
                    <input class="form-check-input device-check" type="checkbox" id="chkOximetro">
                    <label class="form-check-label" for="chkOximetro">Oxímetro</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input device-check" type="checkbox" id="chkWt901">
                    <label class="form-check-label" for="chkWt901">WT901</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input device-check" type="checkbox" id="chkRing">
                    <label class="form-check-label" for="chkRing">Ring / anillo inteligente</label>
                </div>
                <div class="small text-muted mt-2" id="estadoDispositivos">--</div>
            </div>
        </div>

        <div class="text-center mb-3">
            <button id="btnAudio" class="btn btn-danger btn-lg" onclick="activarAudio()">Activar sonido</button>
            <button class="btn btn-secondary btn-lg ms-2" onclick="silenciar5Min()">Silenciar 5 min</button>
        </div>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header fw-bold">Oxímetro</div>
                    <div class="card-body text-center">
                        <div class="display-3 fw-bold" id="spo2">--%</div>
                        <div class="fs-3">Pulso: <span id="pulso">--</span> bpm</div>
                        <div class="mt-2" id="estadoOximetro">--</div>
                        <small id="ultimaOximetro" class="text-muted">--</small>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header fw-bold">Postura WT901</div>
                    <div class="card-body text-center">
                        <div class="display-5 fw-bold" id="postura">--</div>
                        <div class="mt-3">
                            Pitch: <span id="pitch">--</span><br>
                            Roll: <span id="roll">--</span><br>
                            Yaw: <span id="yaw">--</span><br>
                            Batería raw: <span id="bateriaWt901">--</span>
                        </div>
                        <div class="mt-2" id="estadoWt901">--</div>
                        <small id="ultimaWt901" class="text-muted">--</small>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header fw-bold">Ring / anillo inteligente</div>
                    <div class="card-body text-center">
                        <div class="display-3 fw-bold" id="ringSpo2">--%</div>
                        <div class="fs-3">Pulso: <span id="ringPulso">--</span> bpm</div>
                        <div>Batería: <span id="ringBateria">--</span></div>
                        <div>Lecturas: <span id="ringLecturas">--</span></div>
                        <div class="mt-2" id="estadoRing">--</div>
                        <small id="ultimaRing" class="text-muted">--</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mt-3">
            <div class="card-header fw-bold">JSON actual</div>
            <div class="card-body"><pre id="json" class="mb-0 small">Cargando...</pre></div>
        </div>
    </div>

    <script>
        const API_URL = "/estado";

        let audioActivo = false;
        let ultimoSonido = 0;
        let silenciadoHasta = 0;
        let supinoDesde = null;
        let spo2CriticoDesde = null;
        let spo2AlertaDesde = null;
        let spo2PrecaucionDesde = null;
        let sinSpo2ConfiableDesde = null;
        let guardandoDispositivos = false;
        let consultandoEstado = false;
        let erroresApiConsecutivos = 0;


        const SUPINO_CONFIRM_MS = 15000;
        const SPO2_CRITICO_CONFIRM_MS = 3000;
        const SPO2_ALERTA_CONFIRM_MS = 7000;
        const SPO2_PRECAUCION_CONFIRM_MS = 12000;
        const SIN_SPO2_CONFIABLE_CONFIRM_MS = 10000;
        const MAX_ERRORES_API = 20;
        const FETCH_TIMEOUT_MS = 2500;


        const sonidos = {
            OXIMETRO_DESCONECTADO: new Audio('/AlertasIndex/oximetro_desconectado.wav'),
            OXIMETRO_SIN_DATOS: new Audio('/AlertasIndex/oximetro_sin_datos.wav'),
            RING_DESCONECTADO: new Audio('/AlertasIndex/ring_desconectado.wav'),
            RING_SIN_DATOS: new Audio('/AlertasIndex/ring_sin_datos.wav'),
            WT901_DESCONECTADO: new Audio('/AlertasIndex/wt901_desconectado.wav'),
            WT901_SIN_DATOS: new Audio('/AlertasIndex/wt901_sin_datos.wav'),
            SPO2_CRITICO: new Audio('/AlertasIndex/spo2_critica.wav'),
            SPO2_ALERTA: new Audio('/AlertasIndex/spo2_alerta.wav'),
            SPO2_PRECAUCION: new Audio('/AlertasIndex/spo2_precaucion.wav'),
            SUPINO: new Audio('/AlertasIndex/boca_arriba.wav'),
            API_ERROR: new Audio('/AlertasIndex/api_no_responde.wav')
        };

        function dispositivoHabilitado(nombre) {
            if (nombre === 'oximetro') return document.getElementById('chkOximetro').checked;
            if (nombre === 'wt901') return document.getElementById('chkWt901').checked;
            if (nombre === 'ring') return document.getElementById('chkRing').checked;
            return false;
        }

        async function cargarSeleccionDispositivos() {
            try {
                const resp = await fetch('/dispositivos', { cache: 'no-store' });

                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}`);
                }

                const data = await resp.json();

                document.getElementById('chkOximetro').checked = data.oximetro === true;
                document.getElementById('chkWt901').checked = data.wt901 === true;
                document.getElementById('chkRing').checked = data.ring === true;

                actualizarTextoDispositivos();
            } catch {
                document.getElementById('chkOximetro').checked = false;
                document.getElementById('chkWt901').checked = false;
                document.getElementById('chkRing').checked = false;
                actualizarTextoDispositivos();
            }
        }

        async function guardarSeleccionDispositivos() {
            if (guardandoDispositivos) return;

            guardandoDispositivos = true;

            const payload = {
                oximetro: document.getElementById('chkOximetro').checked,
                wt901: document.getElementById('chkWt901').checked,
                ring: document.getElementById('chkRing').checked
            };

            try {
                const resp = await fetch('/dispositivos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}`);
                }

                supinoDesde = null;
                spo2CriticoDesde = null;
                spo2AlertaDesde = null;
                spo2PrecaucionDesde = null;
                sinSpo2ConfiableDesde = null;

                actualizarTextoDispositivos();
            } catch (e) {
                const alertaDiv = document.getElementById('alerta');
                alertaDiv.className = 'alert alert-danger text-center fs-4 fw-bold';
                alertaDiv.innerText = 'No se pudo guardar la selección de dispositivos';
            } finally {
                guardandoDispositivos = false;
            }
        }

        function actualizarTextoDispositivos() {
            const activos = [];

            if (dispositivoHabilitado('oximetro')) activos.push('Oxímetro');
            if (dispositivoHabilitado('wt901')) activos.push('WT901');
            if (dispositivoHabilitado('ring')) activos.push('Ring');

            document.getElementById('estadoDispositivos').innerText =
                activos.length
                    ? `Activos: ${activos.join(' + ')}`
                    : 'Ningún dispositivo activo: no se generarán alertas de sensores.';
        }

        document.querySelectorAll('.device-check').forEach(x => {
            x.addEventListener('change', guardarSeleccionDispositivos);
        });

        function activarAudio() {
            audioActivo = true;

            Object.values(sonidos).forEach(a => {
                a.load();
            });

            detenerSonidos();

            const btn = document.getElementById('btnAudio');
            btn.innerText = 'Sonido activado';
            btn.className = 'btn btn-success btn-lg';
        }

        function silenciar5Min() {
            silenciadoHasta = Date.now() + 5 * 60 * 1000;
            detenerSonidos();
        }

        function detenerSonidos() {
            Object.values(sonidos).forEach(a => {
                try {
                    a.pause();
                    a.currentTime = 0;
                } catch { }
            });
        }

        function obtenerPostura(data) {
            return ((data.wt901 ?? {}).posicion ?? '').toString().toUpperCase();
        }

        function esPosturaLateral(data) {
            const postura = obtenerPostura(data);

            return postura.includes('LATERAL_DERECHO') ||
                postura.includes('LATERAL_IZQUIERDO') ||
                postura.includes('DERECHA') ||
                postura.includes('IZQUIERDA') ||
                postura.includes('DERECHO') ||
                postura.includes('IZQUIERDO');
        }

        function lecturaOxReciente(data) {
            const seg = data.segundosUltimaLecturaOximetro;
            return seg !== null && seg !== undefined && Number(seg) <= 15;
        }

        function lecturaRingReciente(data) {
            const seg = data.segundosUltimaLecturaRing;
            return seg !== null && seg !== undefined && Number(seg) <= 180;
        }

        function lecturaWtReciente(data) {
            const seg = data.segundosUltimaLecturaWt901;
            return seg !== null && seg !== undefined && Number(seg) <= 15;
        }

        function oxConfiable(data) {
            const ox = data.oximetro ?? {};

            return dispositivoHabilitado('oximetro') &&
                ox.conectado === true &&
                ox.spo2 !== null &&
                ox.spo2 !== undefined &&
                Number(ox.spo2) > 20 &&
                lecturaOxReciente(data);
        }

        function ringConfiable(data) {
            const ring = data.ring ?? {};

            return dispositivoHabilitado('ring') &&
                ring.conectado === true &&
                ring.spo2 !== null &&
                ring.spo2 !== undefined &&
                Number(ring.spo2) > 20 &&
                lecturaRingReciente(data);
        }

        function wtConfiable(data) {
            const wt = data.wt901 ?? {};

            return dispositivoHabilitado('wt901') &&
                wt.conectado === true &&
                lecturaWtReciente(data);
        }

        function ringNormalYPosturaLateral(data) {
            const ring = data.ring ?? {};

            return ringConfiable(data) &&
                wtConfiable(data) &&
                Number(ring.spo2) >= 94 &&
                esPosturaLateral(data);
        }

        function oximetroNormalYPosturaLateral(data) {
            const ox = data.oximetro ?? {};

            return oxConfiable(data) &&
                wtConfiable(data) &&
                Number(ox.spo2) >= 94 &&
                esPosturaLateral(data);
        }

        function algunaFuenteSpo2Confiable(data) {
            return oxConfiable(data) || ringConfiable(data);
        }

        function algunaFuenteSpo2Normal(data) {
            const ox = data.oximetro ?? {};
            const ring = data.ring ?? {};

            return (oxConfiable(data) && Number(ox.spo2) >= 94) ||
                (ringConfiable(data) && Number(ring.spo2) >= 94);
        }

        function oximetroNormal(data) {
            const ox = data.oximetro ?? {};

            return oxConfiable(data) &&
                Number(ox.spo2) >= 94;
        }

        function ringNormal(data) {
            const ring = data.ring ?? {};

            return ringConfiable(data) &&
                Number(ring.spo2) >= 94;
        }

        function alertaSoloVisual(tipo, prioridad, texto, clase = 'alert-warning') {
            return {
                tipo,
                prioridad,
                texto,
                clase,
                intervalo: 999999999,
                audio: false
            };
        }

        function evaluarFuenteSpo2(data) {
            const ox = data.oximetro ?? {};
            const ring = data.ring ?? {};

            if (oxConfiable(data)) {
                return {
                    nombre: 'Oxímetro',
                    spo2: Number(ox.spo2),
                    pulso: ox.pulso
                };
            }

            if (ringConfiable(data)) {
                return {
                    nombre: 'Ring',
                    spo2: Number(ring.spo2),
                    pulso: ring.pulso
                };
            }

            if (
                dispositivoHabilitado('oximetro') &&
                ox.spo2 !== null &&
                ox.spo2 !== undefined &&
                Number(ox.spo2) > 20
            ) {
                return {
                    nombre: 'Oxímetro no reciente',
                    spo2: Number(ox.spo2),
                    pulso: ox.pulso
                };
            }

            if (
                dispositivoHabilitado('ring') &&
                ring.spo2 !== null &&
                ring.spo2 !== undefined &&
                Number(ring.spo2) > 20
            ) {
                return {
                    nombre: 'Ring no reciente',
                    spo2: Number(ring.spo2),
                    pulso: ring.pulso
                };
            }

            return {
                nombre: '--',
                spo2: null,
                pulso: null
            };
        }

        function confirmarCondicion(condicion, variableActual, tiempoMs) {
            const ahora = Date.now();

            if (!condicion) {
                return { desde: null, confirmado: false };
            }

            const desde = variableActual ?? ahora;
            return {
                desde,
                confirmado: ahora - desde >= tiempoMs
            };
        }

        function evaluarAlertas(data) {
            const alertas = [];

            const ox = data.oximetro ?? {};
            const wt = data.wt901 ?? {};
            const ring = data.ring ?? {};

            const fuente = evaluarFuenteSpo2(data);
            const hayOxORingSeleccionado =
                dispositivoHabilitado('oximetro') || dispositivoHabilitado('ring');

            if (hayOxORingSeleccionado) {
                const sinSpo2 = !algunaFuenteSpo2Confiable(data);
                const confSinSpo2 = confirmarCondicion(
                    sinSpo2,
                    sinSpo2ConfiableDesde,
                    SIN_SPO2_CONFIABLE_CONFIRM_MS
                );

                sinSpo2ConfiableDesde = confSinSpo2.desde;

                if (confSinSpo2.confirmado) {
                    alertas.push({
                        tipo: 'OXIMETRO_SIN_DATOS',
                        prioridad: 105,
                        texto: 'SIN SpO₂ CONFIABLE: oxímetro/ring sin lectura útil',
                        clase: 'alert-danger',
                        intervalo: 3000
                    });
                }
            } else {
                sinSpo2ConfiableDesde = null;
            }

            if (dispositivoHabilitado('oximetro')) {
                const sinLecturaOx =
                    data.segundosUltimaLecturaOximetro === null ||
                    data.segundosUltimaLecturaOximetro === undefined ||
                    Number(data.segundosUltimaLecturaOximetro) > 15;

                if (ox.conectado !== true) {
                    if (ringNormal(data)) {
                        alertas.push(alertaSoloVisual(
                            'OXIMETRO_DESCONECTADO',
                            15,
                            wtConfiable(data) && esPosturaLateral(data)
                                ? `Oxímetro desconectado, pero ring ${ring.spo2}% y postura lateral`
                                : `Oxímetro desconectado, pero ring ${ring.spo2}% está normal`
                        ));
                    } else {
                        alertas.push({
                            tipo: 'OXIMETRO_DESCONECTADO',
                            prioridad: 96,
                            texto: 'OXÍMETRO DESCONECTADO',
                            clase: 'alert-danger',
                            intervalo: 4000
                        });
                    }
                } else if (sinLecturaOx) {
                    if (ringNormal(data)) {
                        alertas.push(alertaSoloVisual(
                            'OXIMETRO_SIN_DATOS',
                            15,
                            wtConfiable(data) && esPosturaLateral(data)
                                ? `Oxímetro sin datos > 15s, pero ring ${ring.spo2}% y postura lateral`
                                : `Oxímetro sin datos > 15s, pero ring ${ring.spo2}% está normal`
                        ));
                    } else {
                        alertas.push({
                            tipo: 'OXIMETRO_SIN_DATOS',
                            prioridad: 92,
                            texto: 'OXÍMETRO SIN DATOS > 15s',
                            clase: 'alert-danger',
                            intervalo: 4000
                        });
                    }
                }
            }

            if (dispositivoHabilitado('ring')) {
                const sinLecturaRing =
                    data.segundosUltimaLecturaRing === null ||
                    data.segundosUltimaLecturaRing === undefined ||
                    Number(data.segundosUltimaLecturaRing) > 180;

                if (ring.conectado !== true) {
                    if (oximetroNormal(data)) {
                        alertas.push(alertaSoloVisual(
                            'RING_DESCONECTADO',
                            15,
                            wtConfiable(data) && esPosturaLateral(data)
                                ? `Ring desconectado, pero oxímetro ${ox.spo2}% y postura lateral`
                                : `Ring desconectado, pero oxímetro ${ox.spo2}% está normal`
                        ));
                    } else {
                        alertas.push({
                            tipo: 'RING_DESCONECTADO',
                            prioridad: 94,
                            texto: 'RING DESCONECTADO',
                            clase: 'alert-danger',
                            intervalo: 5000
                        });
                    }
                } else if (sinLecturaRing) {
                    if (oximetroNormal(data) && wtConfiable(data) && esPosturaLateral(data)) {
                        // Ring sin datos, pero hay respaldo confiable: oxímetro normal y postura lateral.
                        // No mostrar alerta ni aviso para evitar falsas alarmas.
                    } else if (oximetroNormal(data)) {
                        alertas.push(alertaSoloVisual(
                            'RING_SIN_DATOS',
                            15,
                            `Ring sin datos > 180s, pero oxímetro ${ox.spo2}% está normal`
                        ));
                    } else {
                        alertas.push({
                            tipo: 'RING_SIN_DATOS',
                            prioridad: 90,
                            texto: 'RING SIN DATOS > 180s',
                            clase: 'alert-danger',
                            intervalo: 5000
                        });
                    }
                }
            }

            const spo2Valida =
                fuente.spo2 !== null &&
                fuente.spo2 !== undefined &&
                Number(fuente.spo2) > 20;

            const spo2Menor80 = spo2Valida && fuente.spo2 < 80;
            const spo2Critico = spo2Valida && fuente.spo2 >= 80 && fuente.spo2 < 85;
            const spo2Alerta = spo2Valida && fuente.spo2 >= 85 && fuente.spo2 < 90;
            const spo2Precaucion = spo2Valida && fuente.spo2 >= 90 && fuente.spo2 < 94;

            const confCritico = confirmarCondicion(
                spo2Critico,
                spo2CriticoDesde,
                SPO2_CRITICO_CONFIRM_MS
            );
            spo2CriticoDesde = confCritico.desde;

            const confAlerta = confirmarCondicion(
                spo2Alerta,
                spo2AlertaDesde,
                SPO2_ALERTA_CONFIRM_MS
            );
            spo2AlertaDesde = confAlerta.desde;

            const confPrecaucion = confirmarCondicion(
                spo2Precaucion,
                spo2PrecaucionDesde,
                SPO2_PRECAUCION_CONFIRM_MS
            );
            spo2PrecaucionDesde = confPrecaucion.desde;

            const supinoDetectadoActual =
                dispositivoHabilitado('wt901') &&
                (
                    data.nivelAlerta === 'SUPINO' ||
                    wt.posicion === 'BOCA_ARRIBA' ||
                    wt.alertaSupino === true
                );

            const oxBajoPeroRingNormal =
                spo2Valida &&
                fuente.nombre.startsWith('Oxímetro') &&
                fuente.spo2 < 94 &&
                ringNormal(data) &&
                !supinoDetectadoActual;

            const ringBajoPeroOxNormal =
                spo2Valida &&
                fuente.nombre.startsWith('Ring') &&
                fuente.spo2 < 94 &&
                oximetroNormal(data) &&
                !supinoDetectadoActual;

            if (oxBajoPeroRingNormal) {
                spo2CriticoDesde = null;
                spo2AlertaDesde = null;
                spo2PrecaucionDesde = null;

                alertas.push(alertaSoloVisual(
                    'SPO2_PRECAUCION',
                    18,
                    `Oxímetro ${fuente.spo2}% pero ring normal (${ring.spo2}%). Posible movimiento del dedo o lectura falsa del oxímetro.`
                ));
            } else if (ringBajoPeroOxNormal) {
                spo2CriticoDesde = null;
                spo2AlertaDesde = null;
                spo2PrecaucionDesde = null;

                alertas.push(alertaSoloVisual(
                    'SPO2_PRECAUCION',
                    18,
                    `Ring ${fuente.spo2}% pero oxímetro normal (${ox.spo2}%). Posible lectura dudosa del ring.`
                ));
            } else if (spo2Menor80 || confCritico.confirmado) {
                alertas.push({
                    tipo: 'SPO2_CRITICO',
                    prioridad: 100,
                    texto: `SpO₂ CRÍTICA < 85% (${fuente.nombre}: ${fuente.spo2}%)`,
                    clase: 'alert-danger',
                    intervalo: 2500
                });
            } else if (confAlerta.confirmado) {
                alertas.push({
                    tipo: 'SPO2_ALERTA',
                    prioridad: 85,
                    texto: `SpO₂ BAJA 85-89% sostenida (${fuente.nombre}: ${fuente.spo2}%)`,
                    clase: 'alert-danger',
                    intervalo: 5000
                });
            } else if (confPrecaucion.confirmado) {
                if (fuente.nombre.startsWith('Oxímetro') && ringNormal(data)) {
                    alertas.push(alertaSoloVisual(
                        'SPO2_PRECAUCION',
                        20,
                        wtConfiable(data) && esPosturaLateral(data)
                            ? `Oxímetro ${fuente.spo2}% pero ring normal (${ring.spo2}%) y postura lateral. Posible movimiento.`
                            : `Oxímetro ${fuente.spo2}% pero ring normal (${ring.spo2}%). Posible movimiento.`
                    ));
                } else if (fuente.nombre.startsWith('Ring') && oximetroNormal(data)) {
                    alertas.push(alertaSoloVisual(
                        'SPO2_PRECAUCION',
                        20,
                        wtConfiable(data) && esPosturaLateral(data)
                            ? `Ring ${fuente.spo2}% pero oxímetro normal (${ox.spo2}%) y postura lateral. Posible lectura dudosa.`
                            : `Ring ${fuente.spo2}% pero oxímetro normal (${ox.spo2}%). Posible lectura dudosa.`
                    ));
                } else {
                    alertas.push({
                        tipo: 'SPO2_PRECAUCION',
                        prioridad: 45,
                        texto: `SpO₂ PRECAUCIÓN 90-93% sostenida (${fuente.nombre}: ${fuente.spo2}%)`,
                        clase: 'alert-warning',
                        intervalo: 15000
                    });
                }
            }

            if (dispositivoHabilitado('wt901')) {
                const sinLecturaWt =
                    data.segundosUltimaLecturaWt901 === null ||
                    data.segundosUltimaLecturaWt901 === undefined ||
                    Number(data.segundosUltimaLecturaWt901) > 15;

                if (wt.conectado !== true) {
                    if (algunaFuenteSpo2Normal(data)) {
                        alertas.push(alertaSoloVisual(
                            'WT901_DESCONECTADO',
                            10,
                            'WT901 desconectado, pero SpO₂ está normal'
                        ));
                    } else {
                        alertas.push({
                            tipo: 'WT901_DESCONECTADO',
                            prioridad: 65,
                            texto: 'WT901 DESCONECTADO',
                            clase: 'alert-warning',
                            intervalo: 15000
                        });
                    }
                } else if (sinLecturaWt) {
                    if (algunaFuenteSpo2Normal(data)) {
                        alertas.push(alertaSoloVisual(
                            'WT901_SIN_DATOS',
                            10,
                            'WT901 sin datos > 15s, pero SpO₂ está normal'
                        ));
                    } else {
                        alertas.push({
                            tipo: 'WT901_SIN_DATOS',
                            prioridad: 60,
                            texto: 'WT901 SIN DATOS > 15s',
                            clase: 'alert-warning',
                            intervalo: 15000
                        });
                    }
                }

                const supinoDetectado =
                    data.nivelAlerta === 'SUPINO' ||
                    wt.posicion === 'BOCA_ARRIBA' ||
                    wt.alertaSupino === true;

                const spo2Bajo94 =
                    spo2Valida &&
                    fuente.spo2 < 94;

                if (supinoDetectado) {
                    if (supinoDesde === null) {
                        supinoDesde = Date.now();
                    }

                    if (
                        Date.now() - supinoDesde >= SUPINO_CONFIRM_MS &&
                        spo2Bajo94
                    ) {
                        alertas.push({
                            tipo: 'SUPINO',
                            prioridad: 98,
                            texto: `URGENTE: BOCA ARRIBA > ${Math.floor(SUPINO_CONFIRM_MS / 1000)}s Y SpO₂ ${fuente.spo2}% < 94%`,
                            clase: 'alert-danger',
                            intervalo: 5000
                        });
                    }
                } else {
                    supinoDesde = null;
                }
            } else {
                supinoDesde = null;
            }

            return alertas.sort((a, b) => b.prioridad - a.prioridad);
        }

        function reproducirPatron(alertaPrincipal) {
            if (!audioActivo || !alertaPrincipal) return;
            if (alertaPrincipal.audio === false) return;

            if (Date.now() < silenciadoHasta) return;

            const ahora = Date.now();

            if (ahora - ultimoSonido < alertaPrincipal.intervalo) return;

            ultimoSonido = ahora;

            detenerSonidos();

            const audio = sonidos[alertaPrincipal.tipo];

            if (audio) {
                try {
                    audio.currentTime = 0;
                    audio.play().catch(() => { });
                } catch { }
            }
        }

        function actualizarVisualAlertas(alertas) {
            const alertaDiv = document.getElementById('alerta');

            alertaDiv.className = 'alert text-center fs-4 fw-bold';
            document.body.classList.remove('bg-light', 'bg-warning', 'bg-danger', 'bg-dark');

            if (alertas.length === 0) {
                alertaDiv.classList.add('alert-success');
                alertaDiv.innerText = 'OK - Sin alertas';
                document.body.classList.add('bg-light');
                detenerSonidos();
                return;
            }

            const principal = alertas[0];

            alertaDiv.classList.add(principal.clase);

            const esSoloVisual = alertas.every(a => a.audio === false || a.prioridad < 80);

            alertaDiv.innerText =
                esSoloVisual
                    ? 'AVISO: ' + alertas.map(a => a.texto).join(' + ')
                    : 'ALERTA: ' + alertas.map(a => a.texto).join(' + ');

            if (
                !esSoloVisual &&
                [
                    'OXIMETRO_DESCONECTADO',
                    'OXIMETRO_SIN_DATOS',
                    'RING_DESCONECTADO',
                    'RING_SIN_DATOS',
                    'SPO2_CRITICO',
                    'SPO2_ALERTA',
                    'SUPINO'
                ].includes(principal.tipo) &&
                principal.prioridad >= 80
            ) {
                document.body.classList.add('bg-danger');
            } else {
                document.body.classList.add('bg-light');
            }
        }

        function txt(v, suf = '') {
            return v !== null && v !== undefined ? v + suf : '--';
        }

        function fixed(v) {
            return v !== null && v !== undefined ? Number(v).toFixed(2) : '--';
        }

        function estadoSensor(habilitado, sensor) {
            if (!habilitado) return 'Deshabilitado';
            return sensor?.conectado ? 'Conectado' : 'Reconectando / sin señal';
        }

        function ultima(habilitado, segundos) {
            if (!habilitado) return 'No seleccionado';
            return segundos !== null && segundos !== undefined
                ? `Última lectura hace ${segundos}s`
                : 'Sin lectura';
        }

        async function cargarEstado() {
            if (consultandoEstado) return;

            consultandoEstado = true;

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

            try {
                const resp = await fetch(API_URL, {
                    cache: 'no-store',
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}`);
                }

                const data = await resp.json();
                erroresApiConsecutivos = 0;

                document.getElementById('spo2').innerText = txt(data.oximetro?.spo2, '%');
                document.getElementById('pulso').innerText = txt(data.oximetro?.pulso);
                document.getElementById('estadoOximetro').innerText =
                    estadoSensor(dispositivoHabilitado('oximetro'), data.oximetro);
                document.getElementById('ultimaOximetro').innerText =
                    ultima(dispositivoHabilitado('oximetro'), data.segundosUltimaLecturaOximetro);

                document.getElementById('postura').innerText = data.wt901?.posicion ?? '--';
                document.getElementById('pitch').innerText = fixed(data.wt901?.pitch);
                document.getElementById('roll').innerText = fixed(data.wt901?.roll);
                document.getElementById('yaw').innerText = fixed(data.wt901?.yaw);
                document.getElementById('bateriaWt901').innerText = txt(data.wt901?.batteryRaw);
                document.getElementById('estadoWt901').innerText =
                    estadoSensor(dispositivoHabilitado('wt901'), data.wt901);
                document.getElementById('ultimaWt901').innerText =
                    ultima(dispositivoHabilitado('wt901'), data.segundosUltimaLecturaWt901);

                document.getElementById('ringSpo2').innerText = txt(data.ring?.spo2, '%');
                document.getElementById('ringPulso').innerText = txt(data.ring?.pulso);
                document.getElementById('ringBateria').innerText = txt(data.ring?.bateria, '%');
                document.getElementById('ringLecturas').innerText = txt(data.ring?.lecturasValidas);
                document.getElementById('estadoRing').innerText =
                    estadoSensor(dispositivoHabilitado('ring'), data.ring);
                document.getElementById('ultimaRing').innerText =
                    ultima(dispositivoHabilitado('ring'), data.segundosUltimaLecturaRing);

                const alertas = evaluarAlertas(data);

                actualizarVisualAlertas(alertas);

                if (alertas.length > 0) {
                    reproducirPatron(alertas[0]);
                }

                document.getElementById('json').innerText = JSON.stringify(data, null, 2);
            } catch (e) {
                clearTimeout(timeoutId);

                erroresApiConsecutivos++;

                const alertaDiv = document.getElementById('alerta');
                document.body.classList.remove('bg-light', 'bg-warning', 'bg-danger', 'bg-dark');

                if (erroresApiConsecutivos < MAX_ERRORES_API) {
                    alertaDiv.className = 'alert alert-warning text-center fs-4 fw-bold';
                    alertaDiv.innerText = `Esperando API... (${erroresApiConsecutivos}/${MAX_ERRORES_API})`;
                    document.body.classList.add('bg-light');
                    return;
                }

                alertaDiv.className = 'alert alert-danger text-center fs-4 fw-bold';
                alertaDiv.innerText = `No se pudo conectar con la API (${erroresApiConsecutivos} fallos seguidos)`;
                document.body.classList.add('bg-danger');

                reproducirPatron({
                    tipo: 'API_ERROR',
                    prioridad: 100,
                    texto: 'API NO RESPONDE',
                    clase: 'alert-danger',
                    intervalo: 3000
                });
            } finally {
                consultandoEstado = false;
            }
        }

        cargarSeleccionDispositivos().then(cargarEstado);
        setInterval(cargarEstado, 1000);
    </script>
